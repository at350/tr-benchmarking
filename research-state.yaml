project: legal-reasoning-evaluation-pipeline
branch: codex/research-validation
status: active-autoresearch
last_updated: 2026-05-09

research_question: >
  Can a source-grounded automated pipeline generate legal benchmark questions,
  dynamic rubrics, natural model responses, legal-reasoning clusters, rubric
  judge scores, model rankings, and escalation packets with enough internal
  validity to support a pre-expert-review research manuscript?

current_scope:
  calibration_domain: Statute of Frauds
  target_scope: doctrine-general legal source-to-score evaluation
  current_milestone: robust internal validation and presentable manuscript
  future_milestone: expert legal review and broader doctrine validation

continuity:
  heartbeat: autoresearch-loop
  interval: 20 minutes
  read_first:
    - research-state.yaml
    - findings.md
    - VISION.md

frozen_or_reported_artifacts:
  live_case_study_run: research/runs/live_replicate_roster
  claim_supporting_source_case: cases/MarriageSoF_Anglemire v Policemens Benev Assn of Chicago.pdf
  claim_supporting_source_metadata: cases/MarriageSoF_Anglemire v Policemens Benev Assn of Chicago.metadata.json
  stress_run: research/runs/internal_stress
  perturbation_smoke_config: research/fixtures/tiny_perturbation_config.json
  manuscript: paper/main.tex
  website_manuscript: http://127.0.0.1:3000/paper

current_evidence:
  unit_tests: 83
  live_natural_responses:
    source_case: cases/MarriageSoF_Anglemire v Policemens Benev Assn of Chicago.pdf
    case_id: anglemire_v_policemens_benev_assn_chicago_1939
    models:
      - gpt-5.2
      - claude-sonnet-4-20250514
      - meta/meta-llama-3-70b-instruct
    responses: 9
    observed_clusters: 5
    dasha_member_coherence: 1.0
    rubric_rows: 11
    judge_row_scores: 55
    zak_packets: 1
    status: superseded_by_live_replicate_roster
    purpose: legacy smaller live run retained for provenance only
    summary: >
      Completed full source-to-score live run from the real Anglemire court-case
      PDF. Frank generated a 229-word scenario question with zero quality
      errors, Karthic generated 11 rubric rows, three response-model identifiers
      produced nine natural answers, Dasha formed five coherent reasoning
      clusters, repeated judge scoring produced 55 row scores and three model
      rankings, and Zak produced one escalation packet.
  live_replicate_roster_dasha:
    run: research/runs/live_replicate_roster
    status: claim_supporting_full_pipeline_run
    summary: >
      Completed post-Frank-repair live run using the real Anglemire court-case
      PDF, natural question-only model prompts, ten actual model identifiers,
      two samples per model per track, and original/invariant/material question
      tracks. Frank produced a 1751-character neutral scenario and three
      variations with zero quality errors. The response stage produced 60
      natural answers; all 60 received Dasha reasoning signatures. After the
      multi-path Dasha repair, Dasha now produces 23 track-aware clusters with
      member coherence 1.0, no mixed reasoning flags, invariant dominant-answer
      preservation, and material signed-writing answer-family shift. Judge used
      a two-model panel over 23 centroids, made 46 panel calls, produced 230
      final row-level scores, adjudicated 11 unstable clusters, projected scores
      to all 60 responses, generated ten model rankings, and Zak emitted one
      disputed-cluster packet.
    artifacts:
      - research/runs/live_replicate_roster/frank_packet.json
      - research/runs/live_replicate_roster/responses.json
      - research/runs/live_replicate_roster/dasha_clusters.json
      - research/runs/live_replicate_roster/perturbation_report.json
      - research/runs/live_replicate_roster/dasha_perturbation_audit.json
  statistical_validation:
    status: generated_and_reported
    artifacts:
      - research/runs/live_replicate_roster/statistical_validation.json
      - paper/tables/statistical_validation.tex
    summary: >
      Added inferential diagnostics for the current Anglemire live run and
      controlled Dasha stress regression. Dasha member coherence is 1.000 with
      a 95 percent Wilson interval of [0.940, 1.000]. The material signed-writing
      perturbation shifts the response-label distribution with TVD 1.000 and
      permutation p=0.0005, while the invariant surface edit preserves the
      dominant answer family with TVD 0.100 and p=1.0000. Judge panel stability
      is quantified as weighted kappa 0.630, MAE 0.465, and 18 unstable rows out
      of 230 after panel scoring/adjudication. Projected model rankings are
      emitted, but the top two bootstrap intervals overlap, so the manuscript
      now treats ranking as an auditable protocol output rather than a
      statistically decisive model-superiority claim.
  multipath_dasha_refinement:
    status: exploratory_method_refinement_completed
    artifacts:
      - experiments/multipath-dasha/protocol.md
      - experiments/multipath-dasha/analysis.md
      - experiments/multipath-dasha/results/responses_with_multipath_signatures.json
      - experiments/multipath-dasha/results/dasha_clusters_multipath_tuned_trackaware.json
      - experiments/multipath-dasha/results/multipath_dasha_summary.json
    summary: >
      Regenerated Dasha signatures for the 60 saved Anglemire natural responses
      under the new primary/secondary path schema. A naive key using every
      secondary path produced 49 clusters, showing overfragmentation. The tuned
      method stores the full secondary-path audit profile but clusters on
      Dasha's primary canonical legal fields. After repairing a
      negative-language normalization bug, the full source-to-score rerun
      produced 23 track-aware clusters: 7 original, 6 surface-invariant, and 10
      material signed-writing clusters. Judge was rerun on those clusters and
      the active scored bundle now uses the multi-path Dasha method.
