<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="900" height="240" viewBox="0 0 900 240">

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444444"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="240" fill="#ffffff"/>

  <!-- ════════════════════════════════════
       Box layout:
         Header band : y=20–68  (h=48)
         Sub-label   : y=80     (12–13 px below band bottom)
         Divider     : y=90
         Bullets     : y=108, 128, 148, 168, 188
         Box bottom  : y=215
       ════════════════════════════════════ -->

  <!-- ─── Box 1: Frank (x=20, w=170) ─── -->
  <rect x="20" y="20" width="170" height="195" rx="8" ry="8"
        fill="#ddeeff" stroke="#3a6ea5" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Colored header band -->
  <rect x="20" y="20" width="170" height="48" rx="8" ry="8" fill="#3a6ea5"/>
  <rect x="20" y="54" width="170" height="14" fill="#3a6ea5"/>
  <!-- Stage title -->
  <text x="105" y="50" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="700" fill="#ffffff" letter-spacing="0.5">Frank</text>
  <!-- Sub-label: baseline y=80, top of glyphs ≈ y=69 — safely below band (y=68) -->
  <text x="105" y="80" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="9.5" font-style="italic" fill="#4a6080">Benchmark Construction</text>
  <!-- Divider -->
  <line x1="36" y1="90" x2="174" y2="90" stroke="#9ab5d0" stroke-width="0.8"/>
  <!-- Bullets -->
  <text x="36" y="110" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#1a3050">&#x2022; Benchmark packet</text>
  <text x="36" y="132" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#1a3050">&#x2022; Golden answer</text>
  <text x="36" y="154" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#1a3050">&#x2022; 6 analysis domains</text>
  <text x="36" y="176" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#1a3050">&#x2022; Source grounding</text>

  <!-- Arrow 1 → 2 (gap: x=192 to x=232) -->
  <line x1="192" y1="117" x2="228" y2="117"
        stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── Box 2: Karthic (x=232, w=170) ─── -->
  <rect x="232" y="20" width="170" height="195" rx="8" ry="8"
        fill="#ddf3d8" stroke="#3a8a50" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="232" y="20" width="170" height="48" rx="8" ry="8" fill="#3a8a50"/>
  <rect x="232" y="54" width="170" height="14" fill="#3a8a50"/>
  <text x="317" y="50" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="700" fill="#ffffff" letter-spacing="0.5">Karthic</text>
  <text x="317" y="80" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="9.5" font-style="italic" fill="#2a5030">Rubric Decomposition</text>
  <line x1="248" y1="90" x2="386" y2="90" stroke="#8ac89a" stroke-width="0.8"/>
  <text x="248" y="110" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#112810">&#x2022; 6 weighted domains</text>
  <text x="248" y="132" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#112810">&#x2022; 13 active criteria</text>
  <text x="248" y="154" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#112810">&#x2022; 6 golden targets</text>
  <text x="248" y="176" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#112810">&#x2022; Rubric weights</text>

  <!-- Arrow 2 → 3 (gap: x=404 to x=444) -->
  <line x1="404" y1="117" x2="440" y2="117"
        stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── Box 3: Dasha (x=444, w=214) ─── -->
  <rect x="444" y="20" width="214" height="195" rx="8" ry="8"
        fill="#fff5e0" stroke="#b07a20" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="444" y="20" width="214" height="48" rx="8" ry="8" fill="#b07a20"/>
  <rect x="444" y="54" width="214" height="14" fill="#b07a20"/>
  <text x="551" y="50" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="700" fill="#ffffff" letter-spacing="0.5">Dasha</text>
  <text x="551" y="80" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="9.5" font-style="italic" fill="#6a4a10">Response Analysis &amp; Evaluation</text>
  <line x1="460" y1="90" x2="642" y2="90" stroke="#d4a858" stroke-width="0.8"/>
  <text x="460" y="110" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#3a2800">&#x2022; 240 multi-model responses</text>
  <text x="460" y="132" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#3a2800">&#x2022; Instruction-tuned embeddings</text>
  <text x="460" y="154" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#3a2800">&#x2022; UMAP + HDBSCAN clustering</text>
  <text x="460" y="176" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#3a2800">&#x2022; 3-model ensemble judging</text>
  <text x="460" y="198" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#3a2800">&#x2022; Permutation robustness tests</text>

  <!-- Arrow 3 → 4 (gap: x=660 to x=700) -->
  <line x1="660" y1="117" x2="696" y2="117"
        stroke="#444444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── Box 4: Outputs (x=700, w=182) ─── -->
  <rect x="700" y="20" width="182" height="195" rx="8" ry="8"
        fill="#f0e6ff" stroke="#6a3aab" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="700" y="20" width="182" height="48" rx="8" ry="8" fill="#6a3aab"/>
  <rect x="700" y="54" width="182" height="14" fill="#6a3aab"/>
  <text x="791" y="50" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="700" fill="#ffffff" letter-spacing="0.5">Outputs</text>
  <text x="791" y="80" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="9.5" font-style="italic" fill="#3a1060">Pipeline Artifact &amp; Metrics</text>
  <line x1="716" y1="90" x2="866" y2="90" stroke="#b890e0" stroke-width="0.8"/>
  <text x="716" y="110" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#2a1040">&#x2022; Cluster quality metrics</text>
  <text x="716" y="132" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#2a1040">&#x2022; Robustness p-values</text>
  <text x="716" y="154" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#2a1040">&#x2022; Weighted rubric score</text>
  <text x="716" y="176" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#2a1040">&#x2022; Benchmark insights</text>

</svg>
